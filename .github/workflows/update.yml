name: Auto Update
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - setup-python: '3.10'
      
      - name: Install dependencies
        run: pip install requests cloudscraper

      - name: Fetch Tokens
        run: python fetch_playlist.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Push to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add playlist.m3u
          git commit -m "Update: $(date)" || exit 0
          git push
